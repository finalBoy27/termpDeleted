<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ role|capitalize }} Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #0a0a0f;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 440px;
        width: 100%;
        background: rgba(20,20,35,0.8);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 36px 32px;
      }
      h1 {
        font-size: 1.4rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 24px;
        background: linear-gradient(135deg, #ff6b6b, #845ef7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .flash {
        padding: 12px 16px;
        border-radius: 10px;
        background: rgba(255,70,70,0.12);
        border: 1px solid rgba(255,70,70,0.25);
        color: #ff8787;
        font-size: 0.9rem;
        margin-bottom: 16px;
        text-align: center;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: #999;
        font-size: 0.85rem;
        font-weight: 500;
      }
      .input-group { margin-bottom: 16px; }
      input[type="text"], input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(10,10,20,0.8);
        color: #e0e0e0;
        font-size: 0.95rem;
        font-family: inherit;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
      }
      input:focus {
        border-color: rgba(132,94,247,0.5);
        box-shadow: 0 0 0 3px rgba(132,94,247,0.15);
      }
      button {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #845ef7, #5f3dc4);
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.25s;
        margin-top: 8px;
      }
      button:hover { background: linear-gradient(135deg, #9775fa, #7048e8); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(132,94,247,0.3); }
      .back-link {
        display: block;
        text-align: center;
        margin-top: 18px;
        color: #845ef7;
        text-decoration: none;
        font-size: 0.88rem;
        font-weight: 500;
        transition: color 0.2s;
      }
      .back-link:hover { color: #9775fa; }
      @media (max-width: 480px) {
        .card { padding: 28px 20px; border-radius: 16px; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>{{ role|capitalize }} Login</h1>
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        <div class="input-group">
          <label>Username</label>
          <input name="username" type="text" value="{{ default_user }}" autocomplete="off" />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input name="password" type="password" />
        </div>
        <button type="submit">Login</button>
      </form>
      <a class="back-link" href="/">← Back to Home</a>
    </div>
  </body>
</html>
